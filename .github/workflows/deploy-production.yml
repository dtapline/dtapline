name: Deploy Production
on:
  push:
    tags:
      - "v*" # Triggered when changesets creates a release tag

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-server:
    name: Deploy Server to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ steps.terraform.outputs.api_url }}
    defaults:
      run:
        working-directory: packages/server
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Bundle Lambda code
        run: pnpm bundle:lambda

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_version: "~> 1.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PRD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PRD }}
          aws-region: eu-central-1

      - name: Terraform Init
        working-directory: packages/server/infra
        env:
          TF_WORKSPACE: dtapline-api-prd
        run: terraform init

      - name: Terraform Apply
        id: terraform
        working-directory: packages/server/infra
        env:
          TF_WORKSPACE: dtapline-api-prd
          TF_VAR_stage: "prd"
          TF_VAR_mongodb_uri: ${{ secrets.MONGODB_URI_PRD }}
        run: |
          terraform apply -auto-approve

          # Capture outputs
          API_URL=$(terraform output -raw api_gateway_url)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Report deployment to CloudMatrix
        if: success()
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
        run: |
          npx @dtapline/cli deploy \
            production \
            api \
            ${{ github.sha }} \
            --server-url ${{ vars.DTAPLINE_SERVER_URL || steps.terraform.outputs.api_url }} \
            --git-tag ${{ github.ref_name }} \
            --status success \
            --deployed-by "GitHub Actions" \
            --build-url ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Report failed deployment
        if: failure()
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
        run: |
          npx @dtapline/cli deploy \
            production \
            api \
            ${{ github.sha }} \
            --server-url ${{ vars.DTAPLINE_SERVER_URL || vars.API_GATEWAY_URL_PRD }} \
            --git-tag ${{ github.ref_name }} \
            --status failed \
            --deployed-by "GitHub Actions" \
            --build-url ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  deploy-ui:
    name: Deploy UI to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production-ui
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Build UI
        run: pnpm --filter=@dtapline/ui build
        env:
          VITE_API_URL: ${{ vars.API_GATEWAY_URL_PRD }}

      - name: Deploy to Netlify
        id: deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: "./packages/ui/dist"
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Production deployment ${{ github.ref_name }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Report deployment to CloudMatrix
        if: success()
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
        run: |
          npx @dtapline/cli deploy \
            production \
            ui \
            ${{ github.sha }} \
            --server-url ${{ vars.DTAPLINE_SERVER_URL || vars.API_GATEWAY_URL_PRD }} \
            --git-tag ${{ github.ref_name }} \
            --status success \
            --deployed-by "GitHub Actions" \
            --build-url ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Report failed deployment
        if: failure()
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
        run: |
          npx @dtapline/cli deploy \
            production \
            ui \
            ${{ github.sha }} \
            --server-url ${{ vars.DTAPLINE_SERVER_URL || vars.API_GATEWAY_URL_PRD }} \
            --git-tag ${{ github.ref_name }} \
            --status failed \
            --deployed-by "GitHub Actions" \
            --build-url ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  report-cli-publish:
    name: Report CLI Publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [] # Runs independently
    steps:
      - uses: actions/checkout@v4

      - name: Report CLI deployment to CloudMatrix
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
        run: |
          npx @dtapline/cli deploy \
            production \
            cli \
            ${{ github.sha }} \
            --server-url ${{ vars.DTAPLINE_SERVER_URL || vars.API_GATEWAY_URL_PRD }} \
            --git-tag ${{ github.ref_name }} \
            --status success \
            --deployed-by "GitHub Actions" \
            --build-url ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} \
            --release-notes "Published to NPM registry"
