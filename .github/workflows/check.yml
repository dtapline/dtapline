name: Check
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  types:
    name: Types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip deployment if this is a version bump commit from Changesets
    if: "!contains(github.event.head_commit.message, 'chore(release): version packages')"
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        uses: ./.github/actions/setup
      - run: pnpm check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip deployment if this is a version bump commit from Changesets
    if: "!contains(github.event.head_commit.message, 'chore(release): version packages')"
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        uses: ./.github/actions/setup
      - run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip deployment if this is a version bump commit from Changesets
    if: "!contains(github.event.head_commit.message, 'chore(release): version packages')"
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        uses: ./.github/actions/setup
      - run: pnpm test
        env:
          NODE_OPTIONS: --max_old_space_size=8192
