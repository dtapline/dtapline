name: Deploy CLI to NPM

on:
  push:
    tags:
      - "@dtapline/cli@**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish CLI to NPM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Report deployment in progress
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
          DTAPLINE_SERVER_URL: ${{ vars.DTAPLINE_SERVER_URL }}
        run: |
          pnpm tsx packages/cli/src/index.ts deploy production cli \
            --status in_progress \
            --deployed-version "${GITHUB_REF_NAME##*@}"

      - name: Build packages
        run: pnpm build

      - name: Publish to NPM
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          bun run script/publish.ts

      - name: Report deployment success
        if: success()
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
          DTAPLINE_SERVER_URL: ${{ vars.DTAPLINE_SERVER_URL }}
        run: |
          pnpm tsx packages/cli/src/index.ts deploy production cli \
            --status success \
            --deployed-version "${GITHUB_REF_NAME##*@}"

      - name: Report deployment failure
        if: failure()
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
          DTAPLINE_SERVER_URL: ${{ vars.DTAPLINE_SERVER_URL }}
        run: |
          pnpm tsx packages/cli/src/index.ts deploy production cli \
            --status failed \
            --deployed-version "${GITHUB_REF_NAME##*@}"
