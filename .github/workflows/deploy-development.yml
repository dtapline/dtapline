name: Deploy Development
on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-cli:
    name: Deploy CLI Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      cli-url: ${{ steps.snapshot.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        uses: ./.github/actions/setup
      - name: Build packages
        run: pnpm build
      - name: Create CLI snapshot
        id: snapshot
        run: |
          pnpx pkg-pr-new@0.0.28 publish --pnpm --comment=off ./packages/cli > /tmp/output.txt 2>&1 || true
          cat /tmp/output.txt
          # Extract the npm install URL from the output, removing ANSI codes first
          CLI_URL=$(cat /tmp/output.txt | sed 's/\x1b\[[0-9;]*m//g' | grep -o 'https://pkg\.pr\.new/[^[:space:]]*' | head -1)
          echo "url=$CLI_URL" >> $GITHUB_OUTPUT
          echo "✅ CLI snapshot published: $CLI_URL"

  deploy-server:
    name: Deploy Server to Development
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: deploy-cli
    environment:
      name: development
      url: ${{ steps.terraform.outputs.api_url }}
    defaults:
      run:
        working-directory: packages/server
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Bundle Lambda code
        run: pnpm bundle:lambda

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_version: "1.14.4"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        working-directory: packages/server/infra
        env:
          TF_WORKSPACE: dtapline-api-dev
        run: terraform init

      - name: Terraform Apply
        id: terraform
        working-directory: packages/server/infra
        env:
          TF_WORKSPACE: dtapline-api-dev
          TF_VAR_stage: "dev"
          TF_VAR_mongodb_uri: ${{ vars.MONGODB_URI }}
        run: |
          terraform apply -auto-approve

          # Capture outputs
          API_URL=$(terraform output -raw api_gateway_url)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Report deployment to CloudMatrix
        if: success()
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
        working-directory: /tmp
        run: |
          # Download and extract CLI snapshot
          curl -sL ${{ needs.deploy-cli.outputs.cli-url }} | tar -xz --strip-components=1 package/dist
          # Run CLI directly (it's a self-contained bundle)
          node dist/index.js deploy \
            development \
            api \
            ${{ github.sha }} \
            --server-url ${{ vars.DTAPLINE_SERVER_URL || steps.terraform.outputs.api_url }} \
            --status success \
            --deployed-by "GitHub Actions" \
            --build-url ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Report failed deployment
        if: failure()
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
        working-directory: /tmp
        run: |
          # Download and extract CLI snapshot
          curl -sL ${{ needs.deploy-cli.outputs.cli-url }} | tar -xz --strip-components=1 package/dist
          # Run CLI directly (it's a self-contained bundle)
          node dist/index.js deploy \
            development \
            api \
            ${{ github.sha }} \
            --server-url ${{ vars.DTAPLINE_SERVER_URL || steps.terraform.outputs.api_url }} \
            --status failed \
            --deployed-by "GitHub Actions" \
            --build-url ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          npx dtapline deploy \
            development \
            api \
            ${{ github.sha }} \
            --server-url ${{ vars.DTAPLINE_SERVER_URL || vars.API_GATEWAY_URL }} \
            --status failed \
            --deployed-by "GitHub Actions" \
            --build-url ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  deploy-ui:
    name: Deploy UI to Development
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: deploy-cli
    environment:
      name: development
      url: ${{ vars.NETLIFY_URL }}
    defaults:
      run:
        working-directory: packages/ui
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Build UI
        run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ vars.DTAPLINE_SERVER_URL }}

      - name: Deploy to Netlify (branch deploy)
        id: deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: "./packages/ui/dist"
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Development deployment ${{ github.sha }}"
          alias: development
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ vars.NETLIFY_SITE_ID }}

      - name: Report deployment to CloudMatrix
        if: success()
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
        working-directory: /tmp
        run: |
          # Download and extract CLI snapshot
          curl -sL ${{ needs.deploy-cli.outputs.cli-url }} | tar -xz --strip-components=1 package/dist
          # Run CLI directly (it's a self-contained bundle)
          node dist/index.js deploy \
            development \
            ui \
            ${{ github.sha }} \
            --server-url ${{ vars.DTAPLINE_SERVER_URL || vars.API_GATEWAY_URL }} \
            --status success \
            --deployed-by "GitHub Actions" \
            --build-url ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Report failed deployment
        if: failure()
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
        working-directory: /tmp
        run: |
          # Download and extract CLI snapshot
          curl -sL ${{ needs.deploy-cli.outputs.cli-url }} | tar -xz --strip-components=1 package/dist
          # Run CLI directly (it's a self-contained bundle)
          node dist/index.js deploy \
            development \
            ui \
            ${{ github.sha }} \
            --server-url ${{ vars.DTAPLINE_SERVER_URL || vars.API_GATEWAY_URL }} \
            --status failed \
            --deployed-by "GitHub Actions" \
            --build-url ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
