name: Deploy Development
on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-cli:
    name: Deploy CLI Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip deployment if this is a version bump commit from Changesets
    if: "!contains(github.event.head_commit.message, 'chore(release): version packages')"
    environment:
      name: development
      url: ${{ steps.snapshot.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Report deployment in progress
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
          DTAPLINE_SERVER_URL: ${{ vars.DTAPLINE_SERVER_URL }}
        run: |
          pnpm tsx packages/cli/src/index.ts deploy development cli \
            --status in_progress \
            --deployed-version "$(pnpm tsx scripts/get-next-version.ts @dtapline/cli)"

      - name: Build packages
        run: pnpm build

      - name: Create CLI snapshot
        id: snapshot
        run: |
          pnpx pkg-pr-new@0.0.28 publish --pnpm --comment=off ./packages/cli > /tmp/output.txt 2>&1 || true
          cat /tmp/output.txt
          # Extract the npm install URL from the output, removing ANSI codes first
          CLI_URL=$(cat /tmp/output.txt | sed 's/\x1b\[[0-9;]*m//g' | grep -o 'https://pkg\.pr\.new/[^[:space:]]*' | head -1)
          echo "url=$CLI_URL" >> $GITHUB_OUTPUT
          echo "✅ CLI snapshot published: $CLI_URL"

      - name: Report deployment success
        if: success()
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
          DTAPLINE_SERVER_URL: ${{ vars.DTAPLINE_SERVER_URL }}
        run: |
          pnpm tsx packages/cli/src/index.ts deploy development cli \
            --status success \
            --deployed-version "$(pnpm tsx scripts/get-next-version.ts @dtapline/cli)"

      - name: Report deployment failure
        if: failure()
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
          DTAPLINE_SERVER_URL: ${{ vars.DTAPLINE_SERVER_URL }}
        run: |
          pnpm tsx packages/cli/src/index.ts deploy development cli \
            --status failed \
            --deployed-version "$(pnpm tsx scripts/get-next-version.ts @dtapline/cli)"

  deploy-api:
    name: Deploy API Server to Development
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip deployment if this is a version bump commit from Changesets
    if: "!contains(github.event.head_commit.message, 'chore(release): version packages')"
    environment:
      name: development
      url: ${{ steps.terraform.outputs.api_url }}
    defaults:
      run:
        working-directory: packages/api
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Report deployment in progress
        working-directory: .
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
          DTAPLINE_SERVER_URL: ${{ vars.DTAPLINE_SERVER_URL }}
        run: |
          pnpm tsx packages/cli/src/index.ts deploy development api \
            --status in_progress \
            --deployed-version "$(pnpm tsx scripts/get-next-version.ts @dtapline/api)"

      - name: Bundle Lambda code
        run: pnpm build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_version: "1.14.4"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ASSUME_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        working-directory: packages/api/infra
        env:
          TF_WORKSPACE: dtapline-api-dev
        run: terraform init

      - name: Terraform Apply
        id: terraform
        working-directory: packages/api/infra
        env:
          TF_WORKSPACE: dtapline-api-dev
          TF_VAR_stage: "dev"
          TF_VAR_mongodb_uri: ${{ vars.MONGODB_URI }}
          TF_VAR_auth_secret: ${{ secrets.AUTH_SECRET }}
          TF_VAR_auth_url: ${{ vars.API_BASE_URL }}
          TF_VAR_cors_origins: ${{ vars.CORS_ORIGINS }}
          TF_VAR_github_client_id: ${{ vars.GH_OAUTH_CLIENT_ID }}
          TF_VAR_github_client_secret: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          TF_VAR_custom_domain_name: ${{ vars.CUSTOM_DOMAIN_NAME }}
          TF_VAR_mongodb_atlas_project_id: ${{ vars.MONGODB_ATLAS_PROJECT_ID }}
          TF_VAR_mongodb_atlas_public_key: ${{ vars.MONGODB_ATLAS_PUBLIC_KEY }}
          TF_VAR_mongodb_atlas_private_key: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
        run: |
          terraform apply -auto-approve

          # Capture outputs
          API_URL=$(terraform output -raw api_gateway_url)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Report deployment to CloudMatrix
        if: success()
        working-directory: .
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
          DTAPLINE_SERVER_URL: ${{ vars.DTAPLINE_SERVER_URL || steps.terraform.outputs.api_url }}
        run: |
          pnpm tsx packages/cli/src/index.ts deploy development api \
            --status success \
            --deployed-version "$(pnpm tsx scripts/get-next-version.ts @dtapline/api)"

      - name: Report failed deployment
        if: failure()
        working-directory: .
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
          DTAPLINE_SERVER_URL: ${{ vars.DTAPLINE_SERVER_URL || vars.API_BASE_URL }}
        run: |
          pnpm tsx packages/cli/src/index.ts deploy development api \
            --status failed \
            --deployed-version "$(pnpm tsx scripts/get-next-version.ts @dtapline/api)"

  deploy-ui:
    name: Deploy UI to Development
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip deployment if this is a version bump commit from Changesets
    if: "!contains(github.event.head_commit.message, 'chore(release): version packages')"
    environment:
      name: development
      url: ${{ steps.deploy.outputs.deploy-url }}
    defaults:
      run:
        working-directory: packages/ui
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Report deployment in progress
        working-directory: .
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
          DTAPLINE_SERVER_URL: ${{ vars.DTAPLINE_SERVER_URL }}
        run: |
          pnpm tsx packages/cli/src/index.ts deploy development ui \
            --status in_progress \
            --deployed-version "$(pnpm tsx scripts/get-next-version.ts @dtapline/ui)"

      - name: Build UI
        run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_WS_URL: ${{ vars.WS_URL }}
          VITE_DISABLE_SOCIAL_LOGIN: ${{ vars.DISABLE_SOCIAL_LOGIN }}

      - name: Deploy to Netlify (branch deploy)
        id: deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: "./packages/ui/dist"
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Development deployment ${{ github.sha }}"
          alias: development
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ vars.NETLIFY_SITE_ID }}

      - name: Report deployment to CloudMatrix
        if: success()
        working-directory: .
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
          DTAPLINE_SERVER_URL: ${{ vars.DTAPLINE_SERVER_URL || vars.API_BASE_URL }}
        run: |
          pnpm tsx packages/cli/src/index.ts deploy development ui \
            --status success \
            --deployed-version "$(pnpm tsx scripts/get-next-version.ts @dtapline/ui)"

      - name: Report failed deployment
        if: failure()
        working-directory: .
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
          DTAPLINE_SERVER_URL: ${{ vars.DTAPLINE_SERVER_URL || vars.API_BASE_URL }}
        run: |
          pnpm tsx packages/cli/src/index.ts deploy development ui \
            --status failed \
            --deployed-version "$(pnpm tsx scripts/get-next-version.ts @dtapline/ui)"
