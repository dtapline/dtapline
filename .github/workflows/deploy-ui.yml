name: Deploy UI to Production

on:
  push:
    tags:
      - "@dtapline/ui@**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy UI to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deploy-url }}
    defaults:
      run:
        working-directory: packages/ui
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Report deployment in progress
        working-directory: .
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
          DTAPLINE_SERVER_URL: ${{ vars.DTAPLINE_SERVER_URL }}
        run: |
          pnpm --package=@dtapline/cli dlx dtap deploy production ui \
            --status in_progress \
            --deployed-version "${GITHUB_REF_NAME##*@}"

      - name: Build UI
        run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_WS_URL: ${{ vars.WS_URL }}
          VITE_DISABLE_SOCIAL_LOGIN: ${{ vars.DISABLE_SOCIAL_LOGIN }}

      - name: Deploy to Netlify
        id: deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: "./packages/ui/dist"
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Production deployment ${{ github.ref_name }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ vars.NETLIFY_SITE_ID }}

      - name: Report deployment to Dtapline
        if: success()
        working-directory: .
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
          DTAPLINE_SERVER_URL: ${{ vars.DTAPLINE_SERVER_URL || vars.API_BASE_URL }}
        run: |
          pnpm --package=@dtapline/cli dlx dtap deploy production ui \
            --status success \
            --deployed-version "${GITHUB_REF_NAME##*@}"

      - name: Report failed deployment
        if: failure()
        working-directory: .
        env:
          DTAPLINE_API_KEY: ${{ secrets.DTAPLINE_API_KEY }}
          DTAPLINE_SERVER_URL: ${{ vars.DTAPLINE_SERVER_URL || vars.API_BASE_URL }}
        run: |
          pnpm --package=@dtapline/cli dlx dtap deploy production ui \
            --status failed \
            --deployed-version "${GITHUB_REF_NAME##*@}"
