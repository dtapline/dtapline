      <stop offset="0%" stop-color="#22D3EE"></stop>
      <stop offset="33%" stop-color="#10B981"></stop>
      <stop offset="66%" stop-color="#F59E0B"></stop>
      <stop offset="100%" stop-color="#8B5CF6"></stop>
    </linearGradient>
  </defs>

  <!-- Text with medium contrast colors -->
  <text x="50%" y="70" text-anchor="middle" font-size="56" font-weight="500" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">
    <tspan fill="#22D3EE">d</tspan>
    <tspan fill="#67E8F9">.</tspan>
    <tspan fill="#10B981">t</tspan>
