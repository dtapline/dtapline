# Example Azure Pipeline Integration
#
# This is a complete example showing how to integrate CloudMatrix CLI
# into your Azure DevOps pipeline

trigger:
  branches:
    include:
      - main
      - develop

variables:
  - group: cloudmatrix-secrets  # Create this variable group in Azure DevOps
                                 # and add: DTAPLINE_API_KEY, DTAPLINE_SERVER_URL

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: 'Build Application'
    jobs:
      - job: BuildJob
        displayName: 'Build'
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: '20.x'

          - script: |
              npm ci
              npm run build
              npm test
            displayName: 'Build and Test'

  - stage: DeployDev
    displayName: 'Deploy to Development'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployDevJob
        displayName: 'Deploy to Dev'
        environment: 'development'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    # Your actual deployment commands here
                    echo "Deploying to development..."
                  displayName: 'Deploy Application'

                - script: |
                    npm install -g @dtapline/cli
                  displayName: 'Install CloudMatrix CLI'

                - script: |
                    dtapline deploy \
                      development \
                      my-api-service \
                      $(Build.SourceVersion) \
                      --api-key $(DTAPLINE_API_KEY) \
                      --server-url $(DTAPLINE_SERVER_URL) \
                      --deployed-by "Azure DevOps" \
                      --build-url "$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)" \
                      --status success
                  displayName: 'Report Deployment to CloudMatrix'
                  condition: succeeded()
                  env:
                    DTAPLINE_API_KEY: $(DTAPLINE_API_KEY)

  - stage: DeployStaging
    displayName: 'Deploy to Staging'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployStagingJob
        displayName: 'Deploy to Staging'
        environment: 'staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    # Your actual deployment commands here
                    echo "Deploying to staging..."
                  displayName: 'Deploy Application'

                - script: |
                    npm install -g @dtapline/cli
                  displayName: 'Install CloudMatrix CLI'

                - script: |
                    dtapline deploy \
                      staging \
                      my-api-service \
                      $(Build.SourceVersion) \
                      --api-key $(DTAPLINE_API_KEY) \
                      --server-url $(DTAPLINE_SERVER_URL) \
                      --deployment-version "$(Build.SourceBranchName)" \
                      --deployed-by "Azure DevOps" \
                      --build-url "$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)" \
                      --status success
                  displayName: 'Report Deployment to CloudMatrix'
                  condition: succeeded()
                  env:
                    DTAPLINE_API_KEY: $(DTAPLINE_API_KEY)

  - stage: DeployProduction
    displayName: 'Deploy to Production'
    dependsOn: DeployStaging
    condition: succeeded()
    jobs:
      - deployment: DeployProductionJob
        displayName: 'Deploy to Production'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    # Your actual deployment commands here
                    echo "Deploying to production..."
                  displayName: 'Deploy Application'

                - script: |
                    npm install -g @dtapline/cli
                  displayName: 'Install CloudMatrix CLI'

                - script: |
                    dtapline deploy \
                      production \
                      my-api-service \
                      $(Build.SourceVersion) \
                      --api-key $(DTAPLINE_API_KEY) \
                      --server-url $(DTAPLINE_SERVER_URL) \
                      --deployment-version "$(Build.SourceBranchName)" \
                      --deployed-by "Azure DevOps" \
                      --build-url "$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)" \
                      --status success \
                      --release-notes "$(Build.SourceVersionMessage)"
                  displayName: 'Report Deployment to CloudMatrix'
                  condition: succeeded()
                  env:
                    DTAPLINE_API_KEY: $(DTAPLINE_API_KEY)

                # Report failed deployment
                - script: |
                    dtapline deploy \
                      production \
                      my-api-service \
                      $(Build.SourceVersion) \
                      --api-key $(DTAPLINE_API_KEY) \
                      --server-url $(DTAPLINE_SERVER_URL) \
                      --deployed-by "Azure DevOps" \
                      --build-url "$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)" \
                      --status failed
                  displayName: 'Report Failed Deployment'
                  condition: failed()
                  env:
                    DTAPLINE_API_KEY: $(DTAPLINE_API_KEY)

# Setup Instructions:
#
# 1. In Azure DevOps, go to Pipelines → Library → Variable Groups
# 2. Create a new variable group named "dtapline-secrets"
# 3. Add these variables:
#    - DTAPLINE_API_KEY: Your Dtapline API key (mark as secret!)
#    - DTAPLINE_SERVER_URL: Your Dtapline server URL (e.g., https://api.dtapline.io)
# 4. Save the variable group
# 5. Add this pipeline file to your repository as azure-pipelines.yml
# 6. Create a new pipeline in Azure DevOps pointing to this file
